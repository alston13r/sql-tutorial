<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Log in — SQLite Tutorial</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <script src="../js/theme-init.js"></script>

  <!-- from bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="../css/site.css" />
</head>

<body class="bg-light">
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h1 class="h4 mb-1">SQLite Tutorial</h1>
            <p class="text-muted mb-4">Sign in to save your exercise progress.</p>

            <ul class="nav nav-pills nav-fill mb-4" id="authTabs" role="tablist">
              <li class="nav-item" role="presentation">
                <button class="nav-link active" id="login-tab" data-bs-toggle="pill" data-bs-target="#login-panel" type="button" role="tab" aria-controls="login-panel" aria-selected="true">Log in</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" id="signup-tab" data-bs-toggle="pill" data-bs-target="#signup-panel" type="button" role="tab" aria-controls="signup-panel" aria-selected="false">Sign up</button>
              </li>
            </ul>

            <div id="alert" class="d-none"></div>

            <div class="tab-content">
              <div class="tab-pane fade show active" id="login-panel" role="tabpanel" aria-labelledby="login-tab" tabindex="0">
                <div class="mb-3">
                  <label for="loginIdentifier" class="form-label">Email or username</label>
                  <input id="loginIdentifier" type="text" class="form-control" autocomplete="username" />
                </div>

                <div class="mb-3">
                  <label for="loginPassword" class="form-label">Password</label>
                  <input id="loginPassword" type="password" class="form-control" autocomplete="current-password" />
                </div>

                <button id="btnSignIn" class="btn btn-primary w-100" type="button">Log in</button>
              </div>

              <div class="tab-pane fade" id="signup-panel" role="tabpanel" aria-labelledby="signup-tab" tabindex="0">
                <div class="mb-3">
                  <label for="signupEmail" class="form-label">Email</label>
                  <input id="signupEmail" type="email" class="form-control" autocomplete="email" required />
                </div>

                <div class="mb-3">
                  <label for="signupPassword" class="form-label">Password</label>
                  <input id="signupPassword" type="password" class="form-control" autocomplete="new-password" minlength="6" required />
                </div>

                <button id="btnSignUp" class="btn btn-primary w-100" type="button">Create account</button>
                <p class="text-muted small mt-3 mb-0">
                  After signing up, choose a username on your profile to log in without your email.
                </p>
              </div>
            </div>

            <div class="mt-3 small text-muted">
              <a href="../index.html">Back to modules</a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <footer class="bg-light py-3 mt-auto border-top">
    <div class="container text-center text-muted small">
      SQLite Tutorial &mdash; MIT License<br>
      <a href="https://github.com/alston13r/sql-tutorial" class="link-secondary">GitHub Repository</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script type="module" src="../js/theme.js"></script>
  <script type="module">
    import { supabase } from "../js/supabase-client.js";
    import { signInWithIdentifier } from "../js/auth-helpers.js";
    import { getAuthPaths } from "../js/auth-paths.js";

    const params = new URLSearchParams(window.location.search);
    const returnTo = params.get("returnTo") || getAuthPaths().profile;

    const alertEl = document.getElementById("alert");
    function showAlert(message, type = "danger") {
      alertEl.className = "alert alert-" + type;
      alertEl.textContent = message;
      alertEl.classList.remove("d-none");
    }
    function clearAlert() {
      alertEl.classList.add("d-none");
      alertEl.textContent = "";
    }

    const loginIdentifierEl = document.getElementById("loginIdentifier");
    const loginPasswordEl = document.getElementById("loginPassword");
    const signupEmailEl = document.getElementById("signupEmail");
    const signupPasswordEl = document.getElementById("signupPassword");
    const btnSignIn = document.getElementById("btnSignIn");
    const btnSignUp = document.getElementById("btnSignUp");

    async function init() {
      const { data: sessionData } = await supabase.auth.getSession();
      if (sessionData?.session?.user) {
        window.location.href = returnTo;
      }
    }

    btnSignIn.addEventListener("click", async () => {
      clearAlert();
      const identifier = loginIdentifierEl.value.trim();
      const password = loginPasswordEl.value;

      if (!identifier || !password) {
        return showAlert("Email/username and password are required.", "danger");
      }

      const { error } = await signInWithIdentifier(identifier, password);
      if (error) return showAlert(error.message, "danger");

      window.location.href = returnTo;
    });

    btnSignUp.addEventListener("click", async () => {
      clearAlert();
      const email = signupEmailEl.value.trim();
      const password = signupPasswordEl.value;

      if (!email || !password) {
        return showAlert("Email and password are required.", "danger");
      }

      const { data, error } = await supabase.auth.signUp({ email, password });
      if (error) return showAlert(error.message, "danger");

      if (data?.session?.user) {
        window.location.href = returnTo;
        return;
      }

      showAlert("Account created. Log in, then choose a username on your profile.", "info");
    });

    init().catch((err) => showAlert(err.message || String(err), "danger"));
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Your profile — SQLite Tutorial</title>

  <!-- from bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="../css/site.css" />
</head>

<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
      <a class="navbar-brand" href="../index.html"><i class="bi bi-database me-2"></i>SQLite Tutorial</a>

      <div class="navbar-nav ms-auto align-items-lg-center">
        <a class="nav-link text-white-50" href="../index-path.html">Learning path</a>
        <a class="nav-link" href="./login.html" id="nav-auth-login">Log in</a>
        <a class="nav-link d-none" href="./profile.html" id="nav-auth-profile">Profile</a>
        <a class="nav-link d-none" href="#" id="nav-auth-logout">Log out</a>
        <span class="navbar-text text-white-50 ms-lg-2 d-none d-lg-inline" id="nav-auth-email"></span>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h4 mb-0">Progress</h1>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-primary" href="../index.html">Modules</a>
      </div>
    </div>

    <div id="alert" class="d-none"></div>

    <div class="row g-3">
      <div class="col-lg-4">
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="text-muted small">Signed in as</div>
            <div id="userEmail" class="fw-semibold">—</div>
            <hr />
            <div class="d-flex justify-content-between">
              <span class="text-muted">Completed exercises</span>
              <span id="countCompleted" class="fw-semibold">0</span>
            </div>
            <div class="d-flex justify-content-between">
              <span class="text-muted">In-progress</span>
              <span id="countInProgress" class="fw-semibold">0</span>
            </div>
            <div class="d-flex justify-content-between">
              <span class="text-muted">Not started</span>
              <span id="countNotStarted" class="fw-semibold">0</span>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="h6 mb-3">Last completed exercises</h2>
            <div id="lastCompleted" class="small text-muted">Loading…</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-light py-3 mt-auto border-top">
    <div class="container text-center text-muted small">
      SQLite Tutorial &mdash; MIT License<br>
      <a href="https://github.com/alston13r/sql-tutorial" class="link-secondary">GitHub Repository</a>
    </div>
  </footer>

  <script type="module" src="../js/auth-ui.js"></script>
  <script type="module">
    import { supabase } from "../js/supabase-client.js";

    const alertEl = document.getElementById("alert");
    function showAlert(message, type = "danger") {
      alertEl.className = "alert alert-" + type;
      alertEl.textContent = message;
      alertEl.classList.remove("d-none");
    }

    const userEmailEl = document.getElementById("userEmail");
    const countCompletedEl = document.getElementById("countCompleted");
    const countInProgressEl = document.getElementById("countInProgress");
    const countNotStartedEl = document.getElementById("countNotStarted");
    const lastCompletedEl = document.getElementById("lastCompleted");
    const knownExercises = [
      { module_id: "01-foundations", lesson_id: "intro", exercise_id: "intro-01" },
      { module_id: "02-select", lesson_id: "distinct", exercise_id: "distinct-01" },
      { module_id: "02-select", lesson_id: "aliases", exercise_id: "aliases-01" },
      { module_id: "02-select", lesson_id: "limit", exercise_id: "limit-01" },
      { module_id: "03-filtering", lesson_id: "where", exercise_id: "where-01" },
      { module_id: "03-filtering", lesson_id: "and-or-not", exercise_id: "and-or-01" },
      { module_id: "03-filtering", lesson_id: "not", exercise_id: "not-01" },
      { module_id: "03-filtering", lesson_id: "orderby", exercise_id: "orderby-01" },
      { module_id: "03-filtering", lesson_id: "orderby", exercise_id: "orderby-02" },
      { module_id: "04-modifying", lesson_id: "insert", exercise_id: "insert-01" },
      { module_id: "04-modifying", lesson_id: "update", exercise_id: "update-01" },
      { module_id: "04-modifying", lesson_id: "delete", exercise_id: "delete-01" },
      { module_id: "04-modifying", lesson_id: "null", exercise_id: "null-01" },
      { module_id: "05-aggregates", lesson_id: "count", exercise_id: "count-01" },
      { module_id: "05-aggregates", lesson_id: "sum-avg", exercise_id: "sum-01" },
      { module_id: "05-aggregates", lesson_id: "sum-avg", exercise_id: "avg-01" },
      { module_id: "05-aggregates", lesson_id: "min-max", exercise_id: "min-max-01" },
      { module_id: "06-pattern-matching", lesson_id: "like", exercise_id: "like-01" },
      { module_id: "06-pattern-matching", lesson_id: "in", exercise_id: "in-01" },
      { module_id: "06-pattern-matching", lesson_id: "between", exercise_id: "between-01" },
      { module_id: "07-joins", lesson_id: "inner-join", exercise_id: "inner-01" },
      { module_id: "07-joins", lesson_id: "left-join", exercise_id: "left-01" },
      { module_id: "07-joins", lesson_id: "self-join", exercise_id: "self-01" },
      { module_id: "08-grouping", lesson_id: "groupby", exercise_id: "groupby-01" },
      { module_id: "08-grouping", lesson_id: "having", exercise_id: "having-01" },
      { module_id: "09-advanced-queries", lesson_id: "union", exercise_id: "union-01" },
      { module_id: "09-advanced-queries", lesson_id: "exists", exercise_id: "exists-01" },
      { module_id: "09-advanced-queries", lesson_id: "case", exercise_id: "case-01" },
      { module_id: "10-null-functions", lesson_id: "null-functions", exercise_id: "ifnull-01" },
      { module_id: "10-null-functions", lesson_id: "null-functions", exercise_id: "coalesce-01" },
      { module_id: "11-schema", lesson_id: "create-table", exercise_id: "create-table-01" },
      { module_id: "11-schema", lesson_id: "alter-table", exercise_id: "alter-table-01" },
      { module_id: "11-schema", lesson_id: "drop-table", exercise_id: "drop-table-01" },
    ];

    async function loadProgressRows() {
      const { data, error } = await supabase
        .from("exercise_progress")
        .select("module_id, lesson_id, exercise_id, status, completed_at");

      if (error) throw error;
      return data || [];
    }

    async function loadLastCompleted(data) {
      const completed = [...data]
        .filter((row) => row.status === "completed")
        .sort((a, b) => new Date(b.completed_at || 0) - new Date(a.completed_at || 0))
        .slice(0, 10);

      if (completed.length === 0) {
        lastCompletedEl.textContent = "No completed exercises yet.";
        return;
      }

      lastCompletedEl.innerHTML = `
        <div class="list-group list-group-flush">
          ${completed
            .map(
              (r) => `
            <div class="list-group-item">
              <div class="fw-semibold">${r.module_id} / ${r.lesson_id}</div>
              <div class="text-muted small">${r.exercise_id} — ${
                r.completed_at ? new Date(r.completed_at).toLocaleString() : "—"
              }</div>
            </div>`
            )
            .join("")}
        </div>
      `;
    }

    async function init() {
      const { data: sessionData } = await supabase.auth.getSession();
      const session = sessionData?.session;

      if (!session?.user) {
        const loginUrl = new URL("./login.html", window.location.href);
        loginUrl.searchParams.set("returnTo", window.location.href);
        window.location.href = loginUrl.toString();
        return;
      }

      userEmailEl.textContent = session.user.email || session.user.id;

      const rows = await loadProgressRows();
      const rowMap = new Map(
        rows.map((row) => [`${row.module_id}:${row.lesson_id}:${row.exercise_id}`, row.status])
      );
      let completed = 0;
      let inProgress = 0;
      let notStarted = 0;

      for (const exercise of knownExercises) {
        const key = `${exercise.module_id}:${exercise.lesson_id}:${exercise.exercise_id}`;
        const status = rowMap.get(key) || "not_started";
        if (status === "completed") {
          completed += 1;
        } else if (status === "in_progress") {
          inProgress += 1;
        } else {
          notStarted += 1;
        }
      }

      countCompletedEl.textContent = completed;
      countInProgressEl.textContent = inProgress;
      countNotStartedEl.textContent = notStarted;

      await loadLastCompleted(rows);
    }

    init().catch((err) => {
      showAlert(err.message || String(err), "danger");
      lastCompletedEl.textContent = "Failed to load progress.";
    });
  </script>
</body>
</html>
